name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: npm run check

      - name: Fetch OGame data
        run: npm run fetch

      - name: Build static site
        run: |
          mkdir -p dist/data
          cp -R public/. dist/
          cp data/ogame-ru.json dist/data/ogame-ru.json

      - name: Verify static artifact
        run: |
          test -f dist/index.html
          test -f dist/app.js
          test -f dist/styles.css
          test -f dist/data/ogame-ru.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('dist/data/ogame-ru.json','utf8')); if (!data.generatedAt || !data.stats || !data.highscoreTypes?.length) throw new Error('Invalid generated data');"

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed site
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          curl -fsSL --retry 6 --retry-delay 10 "$url" -o /tmp/pages.html
          grep -q "OGame RU Dashboard" /tmp/pages.html
          curl -fsSL --retry 6 --retry-delay 10 "${url%/}/data/ogame-ru.json" -o /tmp/ogame-ru.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/ogame-ru.json','utf8')); if (!data.generatedAt || !data.stats || !data.highscoreTypes?.length) throw new Error('Invalid deployed data');"
